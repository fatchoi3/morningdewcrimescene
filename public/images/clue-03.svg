<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0b1124"/>
  <rect x="20" y="20" width="560" height="360" rx="16" fill="none" stroke="rgba(169,214,255,0.3)" stroke-width="1.5"/>
  <!-- Letter / paper illustration -->
  <rect x="150" y="80" width="300" height="220" rx="8" fill="rgba(240,235,220,0.08)" stroke="rgba(240,235,220,0.3)" stroke-width="1.5"/>
  <!-- Paper fold top-right corner -->
  <path d="M410 80 L450 80 L450 120 Z" fill="rgba(240,235,220,0.05)" stroke="rgba(240,235,220,0.2)" stroke-width="1"/>
  <!-- Handwritten lines simulation -->
  <line x1="175" y1="130" x2="425" y2="130" stroke="rgba(240,235,220,0.15)" stroke-width="1"/>
  <line x1="175" y1="155" x2="425" y2="155" stroke="rgba(240,235,220,0.15)" stroke-width="1"/>
  <line x1="175" y1="180" x2="425" y2="180" stroke="rgba(240,235,220,0.15)" stroke-width="1"/>
  <line x1="175" y1="205" x2="425" y2="205" stroke="rgba(240,235,220,0.15)" stroke-width="1"/>
  <line x1="175" y1="230" x2="350" y2="230" stroke="rgba(240,235,220,0.15)" stroke-width="1"/>
  <!-- Key text on paper -->
  <text x="300" y="128" text-anchor="middle" fill="rgba(220,210,190,0.8)" font-family="Georgia, serif" font-size="13" font-style="italic">진실은 어둠 속에 있다.</text>
  <!-- Anonymous symbol -->
  <circle cx="300" cy="255" r="18" fill="none" stroke="rgba(169,214,255,0.4)" stroke-width="1.5"/>
  <text x="300" y="261" text-anchor="middle" fill="rgba(169,214,255,0.5)" font-family="serif" font-size="18">?</text>
  <!-- Label -->
  <text x="300" y="340" text-anchor="middle" fill="#c8d0ef" font-family="sans-serif" font-size="15">CLUE-03 · 증거 이미지를 여기에 교체하세요</text>
  <text x="300" y="362" text-anchor="middle" fill="rgba(169,176,217,0.5)" font-family="monospace" font-size="11">/public/images/clue-03.svg (or .jpg/.png)</text>
</svg>
